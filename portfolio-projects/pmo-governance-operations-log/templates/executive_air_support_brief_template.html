<!doctype html><html lang='en'><head><meta charset='utf-8'><title>Executive Air-Support Brief Template</title><style>
body{font-family:Arial,sans-serif;max-width:1000px;margin:40px auto;line-height:1.55;color:#111827}
h1,h2,h3{color:#1f2937}table{border-collapse:collapse;width:100%;margin:16px 0}
th,td{border:1px solid #d1d5db;padding:8px;text-align:left;vertical-align:top}
th{background:#f3f4f6}.note{background:#f9fafb;border-left:4px solid #6b7280;padding:12px}

</style></head><body>
<h1>Executive Air-Support Brief</h1>
<table>
<tr><th>Field</th><th>Content</th></tr>
<tr><td>Issue</td><td>[What is blocked]</td></tr>
<tr><td>Impact</td><td>[Why it matters]</td></tr>
<tr><td>Decision or support needed</td><td>[Specific ask]</td></tr>
<tr><td>Options</td><td>[Option list]</td></tr>
<tr><td>Risk of no action</td><td>[Impact]</td></tr>
<tr><td>Requested owner</td><td>[Name or role]</td></tr>
</table>
</body></html>
